<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Southern Market 202</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Georgia, serif;
            background: #fafafa;
            color: #2c3e50;
        }

        header {
            background: #4a6fa5;
            color: #fafafa;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 28px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fafafa;
        }

        nav {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        nav a {
            color: #fafafa;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a:hover { color: #d4c5a9; }

        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h2 {
            font-size: 22px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 2px solid #4a6fa5;
            padding-bottom: 10px;
            margin-bottom: 24px;
            color: #4a6fa5;
        }

        p {
            font-size: 15px;
            color: #4a5568;
            margin-bottom: 24px;
            line-height: 1.8;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #d4c5a9;
            border-radius: 4px;
            font-size: 14px;
            font-family: Georgia, serif;
            background: #ffffff;
            color: #2c3e50;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        button {
            background: #4a6fa5;
            color: #fafafa;
            border: none;
            padding: 14px 32px;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
        }

        button:hover { background: #3d5d8a; }

        footer {
            background: #4a6fa5;
            color: #d4c5a9;
            text-align: center;
            padding: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Southern Market 202</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <h2>Contact Us</h2>
        <p>Have a question about a piece or want to know more? We'd love to hear from you.</p>
        <input type="text" id="contact-name" placeholder="Your Name">
        <input type="email" id="contact-email" placeholder="Your Email">
        <textarea id="contact-message" placeholder="Your Message"></textarea>
        <button onclick="submitContact()">Send Message</button>
    </main>

    <footer>
        <p>Southern Market 202 &copy; 2025 &nbsp;|&nbsp; Williamston, South Carolina</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://cljkimiocyodlyrlxkjl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsamtpbWlvY3lvZGx5cmx4a2psIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODI4NTUsImV4cCI6MjA5NDk1ODg1NX0.oQ6v5iKSzUGY9cNwv1lUfAFJeqiJAwRQnu6R0bsx2Uw';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function submitContact() {
            const name = document.getElementById('contact-name').value;
            const email = document.getElementById('contact-email').value;
            const message = document.getElementById('contact-message').value;
            if (!name || !email || !message) { 
                alert('Please fill in all fields.'); 
                return; 
            }
            const { error } = await client.from('contacts').insert([{ name, email, message }]);
            alert(error ? 'Error sending message.' : 'Message sent! We will get back to you soon.');
        }
    </script>

</body>
</html>
