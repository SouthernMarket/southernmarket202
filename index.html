<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Southern Market 202</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Georgia, serif;
            background: #ffffff;
            color: #111111;
        }

        header {
            background: #111111;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        nav {
            margin-top: 12px;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 12px;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a:hover { color: #aaaaaa; }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        section {
            margin-bottom: 50px;
        }

        h2 {
            font-size: 22px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid #111111;
            padding-bottom: 10px;
            margin-bottom: 24px;
        }

        #products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .product-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .product-info {
            padding: 16px;
        }

        .product-info h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .product-info p {
            font-size: 14px;
            color: #555555;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #111111 !important;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            font-size: 14px;
            font-family: Georgia, serif;
        }

        .contact-form textarea {
            height: 120px;
            resize: vertical;
        }

        .contact-form button {
            background: #111111;
            color: #ffffff;
            border: none;
            padding: 14px 32px;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
        }

        .contact-form button:hover {
            background: #333333;
        }

        #home p {
            font-size: 16px;
            line-height: 1.8;
            color: #444444;
        }

        footer {
            background: #111111;
            color: #aaaaaa;
            text-align: center;
            padding: 20px;
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Southern Market 202</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#shop">Shop</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <main>
        <section id="home">
            <h2>Welcome</h2>
            <p>Antiques, vintage goods and unique finds from the American South.</p>
        </section>

        <section id="shop">
            <h2>Shop</h2>
            <div id="products-grid">
                <p>Loading products...</p>
            </div>
        </section>

        <section id="contact">
            <h2>Contact Us</h2>
            <div class="contact-form">
                <input type="text" id="contact-name" placeholder="Your Name">
                <input type="email" id="contact-email" placeholder="Your Email">
                <textarea id="contact-message" placeholder="Your Message"></textarea>
                <button onclick="submitContact()">Send Message</button>
            </div>
        </section>
    </main>

    <footer>
        <p>Southern Market 202 &copy; 2025 &nbsp;|&nbsp; Upstate South Carolina</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://cljkimiocyodlyrlxkjl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsamtpbWlvY3lvZGx5cmx4a2psIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODI4NTUsImV4cCI6MjA5NDk1ODg1NX0.oQ6v5iKSzUGY9cNwv1lUfAFJeqiJAwRQnu6R0bsx2Uw';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProducts() {
            const { data, error } = await client.from('products').select('*').eq('available', true);
            const grid = document.getElementById('products-grid');
            if (error) { grid.innerHTML = '<p>Error loading products.</p>'; return; }
            if (!data.length) { grid.innerHTML = '<p>No products yet.</p>'; return; }
            grid.innerHTML = data.map(p => `
                <div class="product-card">
                    ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}">` : ''}
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p>${p.description}</p>
                        <p class="product-price">$${p.price}</p>
                    </div>
                </div>
            `).join('');
        }

        async function submitContact() {
            const name = document.getElementById('contact-name').value;
            const email = document.getElementById('contact-email').value;
            const message = document.getElementById('contact-message').value;
            const { error } = await client.from('contacts').insert([{ name, email, message }]);
            alert(error ? 'Error sending message.' : 'Message sent!');
        }

        loadProducts();
    </script>

</body>
</html>
