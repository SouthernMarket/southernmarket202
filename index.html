<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Southern Market 202</title>
</head>
<body>

    <header>
        <h1>Southern Market 202</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#shop">Shop</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <main>
        <section id="home">
            <h2>Welcome to Southern Market 202</h2>
            <p>Antiques, vintage goods and unique finds.</p>
        </section>

        <section id="shop">
            <h2>Shop</h2>
            <div id="products-container">
                <p>Loading products...</p>
            </div>
        </section>

        <section id="contact">
            <h2>Contact Us</h2>
            <input type="text" id="contact-name" placeholder="Your Name">
            <input type="email" id="contact-email" placeholder="Your Email">
            <textarea id="contact-message" placeholder="Your Message"></textarea>
            <button onclick="submitContact()">Send Message</button>
        </section>
    </main>

    <footer>
        <p>Southern Market 202 &copy; 2025</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://cljkimiocyodlyrlxkjl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsamtpbWlvY3lvZGx5cmx4a2psIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODI4NTUsImV4cCI6MjA5NDk1ODg1NX0.oQ6v5iKSzUGY9cNwv1lUfAFJeqiJAwRQnu6R0bsx2Uw';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProducts() {
            const { data, error } = await client.from('products').select('*').eq('available', true);
            const container = document.getElementById('products-container');
            if (error) { container.innerHTML = '<p>Error loading products.</p>'; return; }
            if (!data.length) { container.innerHTML = '<p>No products yet.</p>'; return; }
            container.innerHTML = data.map(p => `
                <div>
                    <h3>${p.name}</h3>
                    <p>${p.description}</p>
                    <p>$${p.price}</p>
                </div>
            `).join('');
        }

        async function submitContact() {
            const name = document.getElementById('contact-name').value;
            const email = document.getElementById('contact-email').value;
            const message = document.getElementById('contact-message').value;
            const { error } = await client.from('contacts').insert([{ name, email, message }]);
            alert(error ? 'Error sending message.' : 'Message sent!');
        }

        loadProducts();
    </script>

</body>
</html>
