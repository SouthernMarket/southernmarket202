<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal — Southern Market 202</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy:   #1a2744;
            --black:  #0a0a0a;
            --blue:   #a8c0d6;
            --white:  #ffffff;
            --heading:#1a1a1a;
            --body:   #5a5a5a;
            --border: #e8e8e8;
            --dim:    rgba(255,255,255,0.55);
            --dborder:rgba(255,255,255,0.12);
        }

        body {
            font-family: 'Helvetica Neue', Arial, Helvetica, sans-serif;
            background: var(--white);
            color: var(--heading);
        }

        /* ── HEADER ── */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 48px;
            height: 72px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 200;
        }

        .logo { text-decoration: none; display: inline-block; line-height: 1; }

        .logo-block {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            background: var(--navy);
            padding: 8px 14px 10px;
            gap: 3px;
        }

        .logo-top {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--white);
            display: block;
            white-space: nowrap;
        }

        .logo-bottom {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--white);
            display: block;
            white-space: nowrap;
        }

        nav {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
        }

        nav a {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--navy);
            text-decoration: none;
            transition: color 0.2s;
        }

        nav a:hover, nav a.active { color: var(--blue); }

        .header-right {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
        }

        .header-social { display: flex; gap: 14px; align-items: center; }
        .header-social a { display: flex; color: var(--blue); transition: opacity 0.2s; }
        .header-social a:hover { opacity: 0.65; }
        .header-social svg { width: 18px; height: 18px; fill: currentColor; }

        /* ── HAMBURGER ── */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 4px;
            background: none;
            border: none;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--navy);
            transition: all 0.3s;
        }

        .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* ── MOBILE MENU ── */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 72px;
            left: 0;
            right: 0;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            z-index: 199;
            padding: 24px 32px;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }

        .mobile-menu.open { display: flex; }

        .mobile-menu a {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--navy);
            text-decoration: none;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            transition: color 0.2s;
        }

        .mobile-menu a:last-child { border-bottom: none; }
        .mobile-menu a:hover, .mobile-menu a.active { color: var(--blue); }

        .mobile-social { display: flex; gap: 16px; padding-top: 20px; }
        .mobile-social a { display: flex; color: var(--blue); }
        .mobile-social svg { width: 20px; height: 20px; fill: currentColor; }

        /* ── PAGE HERO ── */
        .page-hero {
            background: var(--navy);
            padding: 96px 48px;
            text-align: center;
        }

        .page-hero p {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 16px;
        }

        .page-hero h1 {
            font-size: 64px;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 20px;
        }

        .page-hero .subheading {
            font-size: 18px;
            font-weight: 400;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0;
            text-transform: none;
            line-height: 1.6;
        }

        /* ── JOURNAL SECTION ── */
        .journal-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 96px 48px;
        }

        /* ── POST GRID ── */
        #posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 40px;
        }

        /* ── POST CARD ── */
        .post-card {
            background: var(--white);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(26,39,68,0.1);
        }

        .post-cover {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .post-cover-placeholder {
            width: 100%;
            height: 220px;
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .post-cover-placeholder svg {
            opacity: 0.2;
        }

        .post-info {
            padding: 28px 28px 32px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .post-category {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 12px;
        }

        .post-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--heading);
            letter-spacing: -0.3px;
            line-height: 1.25;
            margin-bottom: 12px;
        }

        .post-excerpt {
            font-size: 14px;
            color: var(--body);
            line-height: 1.75;
            margin-bottom: 24px;
            flex: 1;
        }

        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 20px;
            margin-top: auto;
        }

        .post-date {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #b0b0b0;
        }

        .post-read-more {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--navy);
            text-decoration: none;
            border-bottom: 2px solid var(--blue);
            padding-bottom: 2px;
            transition: color 0.2s, border-color 0.2s;
        }

        .post-read-more:hover {
            color: var(--blue);
            border-color: var(--navy);
        }

        .empty-msg {
            color: var(--body);
            font-size: 15px;
            line-height: 1.75;
            text-align: center;
            padding: 80px 0;
        }

        /* ── FOOTER ── */
        footer {
            background: var(--black);
            border-top: 1px solid var(--dborder);
            padding: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-logo { text-decoration: none; display: inline-block; }

        .footer-logo-block {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 3px;
        }

        .footer-logo-top {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--white);
            text-transform: uppercase;
            display: block;
            white-space: nowrap;
        }

        .footer-logo-bottom {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--white);
            text-transform: uppercase;
            display: block;
            white-space: nowrap;
        }

        .footer-copy { font-size: 12px; font-weight: 400; color: var(--dim); letter-spacing: 0.3px; }
        .footer-social { display: flex; gap: 16px; }
        .footer-social a { color: var(--dim); transition: color 0.2s; }
        .footer-social a:hover { color: var(--white); }
        .footer-social svg { width: 18px; height: 18px; fill: currentColor; }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            header { padding: 0 20px; grid-template-columns: 1fr auto; }
            nav { display: none; }
            .header-social { display: none; }
            .hamburger { display: flex; }
            .page-hero { padding: 64px 24px; }
            .page-hero h1 { font-size: 42px; }
            .journal-section { padding: 56px 20px; }
            #posts-grid { grid-template-columns: 1fr; gap: 24px; }
            footer { flex-direction: column; gap: 24px; text-align: center; padding: 40px 24px; }
            .footer-logo-block { align-items: center; }
        }
    </style>

<script>
    const SUPABASE_URL = 'https://cljkimiocyodlyrlxkjl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsamtpbWlvY3lvZGx5cmx4a2psIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODI4NTUsImV4cCI6MjA5NDk1ODg1NX0.oQ6v5iKSzUGY9cNwv1lUfAFJeqiJAwRQnu6R0bsx2Uw';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function toggleMenu() {
        document.getElementById('mobile-menu').classList.toggle('open');
        document.getElementById('hamburger').classList.toggle('open');
    }

    function formatDate(dateStr) {
        return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function loadPosts() {
        const { data, error } = await client
            .from('blog_posts')
            .select('*')
            .eq('published', true)
            .order('published_at', { ascending: false });

        const grid = document.getElementById('posts-grid');

        if (error) {
            grid.innerHTML = '<p class="empty-msg">Unable to load posts right now. Please check back soon.</p>';
            return;
        }

        if (!data.length) {
            grid.innerHTML = '<p class="empty-msg">No posts yet — check back soon. We have a lot of stories to tell.</p>';
            return;
        }

        grid.innerHTML = data.map(post => `
            <div class="post-card">
                ${post.cover_image_url
                    ? `<img src="${post.cover_image_url}" alt="${post.title}" class="post-cover">`
                    : `<div class="post-cover-placeholder">
                        <svg width="64" height="64" viewBox="0 0 48 48" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="6" y="10" width="36" height="28" rx="1"/>
                            <circle cx="18" cy="21" r="5"/>
                            <path d="M6 34 L15 25 L22 32 L30 24 L42 34"/>
                        </svg>
                       </div>`
                }
                <div class="post-info">
                    <p class="post-category">${post.category || 'Journal'}</p>
                    <h2 class="post-title">${post.title}</h2>
                    <p class="post-excerpt">${post.excerpt || ''}</p>
                    <div class="post-footer">
                        <span class="post-date">${formatDate(post.published_at)}</span>
                        <a href="#" class="post-read-more">Read More</a>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function calibrateLogos() {
        [['.logo-top', '.logo-bottom'], ['.footer-logo-top', '.footer-logo-bottom']].forEach(([t, b]) => {
            document.querySelectorAll(t).forEach(top => {
                const bottom = top.parentElement.querySelector(b);
                if (!bottom) return;
                top.style.letterSpacing = '0px';
                const gap = (bottom.getBoundingClientRect().width - top.getBoundingClientRect().width) / top.textContent.trim().length;
                top.style.letterSpacing = Math.max(0, gap) + 'px';
            });
        });
    }

    document.addEventListener('DOMContentLoaded', calibrateLogos);
    window.addEventListener('resize', calibrateLogos);

    loadPosts();
</script>
