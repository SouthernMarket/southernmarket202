<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — Southern Market 202</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --blue: #4a6fa5;
            --blue-light: #e8f0fb;
            --blue-pale: #f4f8ff;
            --ink: #1c1c1e;
            --ink-light: #5a6070;
            --cream: #fdfcfa;
            --border: #dce6f0;
            --aged: #c8d4e0;
            --paper: #faf7f2;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--blue-pale);
            color: var(--ink);
        }

        /* ── HEADER ── */
        header {
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            padding: 0 48px;
            height: 72px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 200;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--ink);
            text-decoration: none;
            text-transform: uppercase;
        }

        .logo em { font-style: normal; color: var(--blue); }

        nav {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        nav a {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--ink);
            text-decoration: none;
            transition: color 0.2s;
        }

        nav a:hover, nav a.active { color: var(--blue); }

        .header-right {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
        }

        .header-social {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .header-social a { display: flex; color: var(--blue); transition: opacity 0.2s; }
        .header-social a:hover { opacity: 0.6; }
        .header-social svg { width: 18px; height: 18px; fill: var(--blue); }

        #cart-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--ink);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #cart-btn:hover { background: var(--blue); color: #fff; border-color: var(--blue); }

        /* ── PAGE HERO ── */
        .page-hero {
            background: var(--ink);
            padding: 80px 48px;
            text-align: center;
        }

        .page-hero p {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #6a8aaa;
            margin-bottom: 12px;
        }

        .page-hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 56px;
            font-weight: 300;
            color: #ffffff;
            letter-spacing: -1px;
        }

        .page-hero h1 em {
            font-style: italic;
            color: #8ab0d8;
        }

        /* ── PRODUCTS ── */
        .shop-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 48px;
        }

        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 48px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .shop-header-left p {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 8px;
        }

        .shop-header-left h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 300;
            color: var(--ink);
        }

        #products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 32px;
        }

        /* PRICE TAG CARDS */
        .product-card {
            background: var(--paper);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .product-card:hover { transform: translateY(-4px); }

        /* Aged border effect */
        .product-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid var(--aged);
            z-index: 1;
            pointer-events: none;
        }

        .product-card::after {
            content: '';
            position: absolute;
            inset: 5px;
            border: 1px solid var(--border);
            z-index: 1;
            pointer-events: none;
        }

        /* Price tag hole at top */
        .price-tag-hole {
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 12px;
            background: var(--blue-pale);
            border: 1px solid var(--aged);
            border-top: none;
            border-radius: 0 0 12px 12px;
            z-index: 2;
        }

        .product-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
            filter: sepia(8%) contrast(95%);
        }

        .product-img-placeholder {
            width: 100%;
            height: 260px;
            background: var(--blue-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .product-info {
            padding: 24px;
            background: var(--paper);
            border-top: 1px solid var(--aged);
            position: relative;
        }

        /* Texture lines */
        .product-info::before {
            content: '';
            position: absolute;
            top: 0; left: 24px; right: 24px;
            height: 1px;
            background: repeating-linear-gradient(90deg, var(--aged) 0, var(--aged) 4px, transparent 4px, transparent 8px);
        }

        .product-category {
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 8px;
        }

        .product-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 400;
            color: var(--ink);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .product-desc {
            font-size: 13px;
            font-weight: 300;
            color: var(--ink-light);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--ink);
        }

        .add-to-cart {
            background: var(--ink);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-to-cart:hover { background: var(--blue); }

        /* ── CART DRAWER ── */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 300;
        }

        #overlay.open { display: block; }

        #cart-drawer {
            position: fixed;
            top: 0;
            right: -420px;
            width: 420px;
            height: 100%;
            background: #ffffff;
            z-index: 400;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
        }

        #cart-drawer.open { right: 0; }

        .cart-head {
            padding: 28px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-head h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 400;
            color: var(--ink);
            letter-spacing: 1px;
        }

        #close-cart {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--ink-light);
            cursor: pointer;
        }

        #cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-info { flex: 1; }

        .cart-item-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 4px;
        }

        .cart-item-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            color: var(--blue);
        }

        .remove-item {
            background: none;
            border: none;
            color: var(--aged);
            cursor: pointer;
            font-size: 20px;
            padding: 4px;
            transition: color 0.2s;
        }

        .remove-item:hover { color: var(--ink); }

        .cart-foot {
            padding: 24px 32px;
            border-top: 1px solid var(--border);
        }

        #cart-total {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--ink);
            margin-bottom: 20px;
            text-align: right;
        }

        #checkout-btn {
            width: 100%;
            background: var(--ink);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }

        #checkout-btn:hover { background: var(--blue); }
        #checkout-btn:disabled { background: var(--aged); cursor: not-allowed; }

        .success-banner {
            background: var(--blue);
            color: #ffffff;
            text-align: center;
            padding: 16px;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* ── FOOTER ── */
        footer {
            background: var(--ink);
            padding: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ffffff;
            text-decoration: none;
        }

        .footer-logo em { font-style: normal; color: #6a9fd8; }
        .footer-copy { font-size: 11px; font-weight: 300; letter-spacing: 1px; color: #5a6a7a; }

        .footer-social { display: flex; gap: 16px; }
        .footer-social a { color: #5a6a7a; transition: color 0.2s; }
        .footer-social a:hover { color: #6a9fd8; }
        .footer-social svg { width: 18px; height: 18px; fill: currentColor; }

        @media (max-width: 768px) {
            header { padding: 0 20px; grid-template-columns: 1fr auto; }
            .header-social { display: none; }
            .shop-section { padding: 40px 20px; }
            #cart-drawer { width: 100%; right: -100%; }
            footer { flex-direction: column; gap: 20px; text-align: center; }
        }
    </style>
</head>

</header>

        <button id="close-cart" onclick="closeCart()">×</button>

        <p style="color:var(--aged);text-align:center;margin-top:40px;font-size:13px;letter-spacing:1px;">Your cart is empty</p>

        <button id="checkout-btn" onclick="checkout()">Proceed to Checkout</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://cljkimiocyodlyrlxkjl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsamtpbWlvY3lvZGx5cmx4a2psIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODI4NTUsImV4cCI6MjA5NDk1ODg1NX0.oQ6v5iKSzUGY9cNwv1lUfAFJeqiJAwRQnu6R0bsx2Uw';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('success')) {
        const banner = document.createElement('div');
        banner.className = 'success-banner';
        banner.textContent = '✓ Thank you for your order! We will be in touch soon.';
        document.body.insertBefore(banner, document.querySelector('.page-hero'));
    }

    let cart = [];

    function openCart() {
        document.getElementById('cart-drawer').classList.add('open');
        document.getElementById('overlay').classList.add('open');
    }

    function closeCart() {
        document.getElementById('cart-drawer').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
    }

    function addToCart(id, name, price) {
        const existing = cart.find(i => i.id === id);
        if (existing) { existing.qty += 1; }
        else { cart.push({ id, name, price, qty: 1 }); }
        updateCart();
        openCart();
    }

    function removeFromCart(id) {
        cart = cart.filter(i => i.id !== id);
        updateCart();
    }

    function updateCart() {
        const count = cart.reduce((sum, i) => sum + i.qty, 0);
        const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
        document.getElementById('cart-count').textContent = count;
        document.getElementById('cart-total').textContent = `Total: $${total.toFixed(2)}`;
        const cartItems = document.getElementById('cart-items');
        if (!cart.length) {
            cartItems.innerHTML = '<p style="color:var(--aged);text-align:center;margin-top:40px;font-size:13px;letter-spacing:1px;">Your cart is empty</p>';
            return;
        }
        cartItems.innerHTML = cart.map(i => `
            <div class="cart-item">
                <div class="cart-item-info">
                    <div class="cart-item-name">${i.name} × ${i.qty}</div>
                    <div class="cart-item-price">$${(i.price * i.qty).toFixed(2)}</div>
                </div>
                <button class="remove-item" onclick="removeFromCart(${i.id})">×</button>
            </div>
        `).join('');
    }

    async function checkout() {
        if (!cart.length) { alert('Your cart is empty!'); return; }
        const btn = document.getElementById('checkout-btn');
        btn.textContent = 'Processing...';
        btn.disabled = true;
        try {
            const response = await fetch(`${SUPABASE_URL}/functions/v1/create-checkout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
                body: JSON.stringify({ items: cart }),
            });
            const data = await response.json();
            if (data.url) { window.location.href = data.url; }
            else { throw new Error(data.error || 'Checkout failed'); }
        } catch (error) {
            alert('Checkout error: ' + error.message);
            btn.textContent = 'Proceed to Checkout';
            btn.disabled = false;
        }
    }

    async function loadProducts() {
        const { data, error } = await client.from('products').select('*').eq('available', true);
        const grid = document.getElementById('products-grid');
        if (error) { grid.innerHTML = '<p>Error loading products.</p>'; return; }
        if (!data.length) { grid.innerHTML = '<p style="color:var(--ink-light);font-size:14px;letter-spacing:1px;">No products yet — check back soon.</p>'; return; }
        grid.innerHTML = data.map(p => `
            <div class="product-card">
                <div class="price-tag-hole"></div>
                ${p.image_url
                    ? `<img src="${p.image_url}" alt="${p.name}" class="product-img">`
                    : `<div class="product-img-placeholder">🏺</div>`
                }
                <div class="product-info">
                    <p class="product-category">${p.category || 'Vintage'}</p>
                    <h3 class="product-name">${p.name}</h3>
                    <p class="product-desc">${p.description}</p>
                    <div class="product-footer">
                        <span class="product-price">$${p.price}</span>
                        <button class="add-to-cart" onclick="addToCart(${p.id}, '${p.name}', ${p.price})">Add to Cart</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    loadProducts();
