<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — Southern Market 202</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Georgia, serif;
            background: #fafafa;
            color: #2c3e50;
        }

        header {
            background: #4a6fa5;
            color: #fafafa;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 28px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fafafa;
        }

        nav {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        nav a {
            color: #fafafa;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a:hover { color: #d4c5a9; }

        #cart-icon {
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fafafa;
            background: none;
            border: 1px solid #fafafa;
            padding: 6px 12px;
            border-radius: 4px;
        }

        #cart-icon:hover { background: #3d5d8a; }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        h2 {
            font-size: 22px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 2px solid #4a6fa5;
            padding-bottom: 10px;
            margin-bottom: 24px;
            color: #4a6fa5;
        }

        #products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: #ffffff;
            border: 1px solid #d4c5a9;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(74,111,165,0.1);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .product-card:hover { box-shadow: 0 4px 16px rgba(74,111,165,0.25); }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .product-info { padding: 16px; }
        .product-info h3 { font-size: 16px; margin-bottom: 8px; color: #2c3e50; }

        .product-info p {
            font-size: 14px;
            color: #6b7c8d;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #4a6fa5 !important;
        }

        .add-to-cart {
            width: 100%;
            background: #4a6fa5;
            color: #fafafa;
            border: none;
            padding: 10px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            border-radius: 4px;
        }

        .add-to-cart:hover { background: #3d5d8a; }

        #cart-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 320px;
            height: 100%;
            background: #ffffff;
            box-shadow: -4px 0 20px rgba(0,0,0,0.2);
            z-index: 200;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }

        #cart-drawer.open { right: 0; }

        #cart-header {
            background: #4a6fa5;
            color: #fafafa;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #cart-header h3 {
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #close-cart {
            background: none;
            border: none;
            color: #fafafa;
            font-size: 24px;
            cursor: pointer;
        }

        #cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #d4c5a9;
        }

        .cart-item-name { font-size: 14px; color: #2c3e50; }
        .cart-item-price { font-size: 14px; font-weight: bold; color: #4a6fa5; }

        .remove-item {
            background: none;
            border: none;
            color: #999999;
            cursor: pointer;
            font-size: 18px;
            margin-left: 10px;
        }

        #cart-footer {
            padding: 20px;
            border-top: 1px solid #d4c5a9;
            background: #fafafa;
        }

        #cart-total {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 16px;
            text-align: right;
            color: #4a6fa5;
        }

        #checkout-btn {
            width: 100%;
            background: #4a6fa5;
            color: #fafafa;
            border: none;
            padding: 14px;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
        }

        #checkout-btn:hover { background: #3d5d8a; }

        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 150;
        }

        #overlay.open { display: block; }

        footer {
            background: #4a6fa5;
            color: #d4c5a9;
            text-align: center;
            padding: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Southern Market 202</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <button id="cart-icon" onclick="openCart()">Cart (<span id="cart-count">0</span>)</button>
        </nav>
    </header>

    <div id="overlay" onclick="closeCart()"></div>

    <div id="cart-drawer">
        <div id="cart-header">
            <h3>Your Cart</h3>
            <button id="close-cart" onclick="closeCart()">×</button>
        </div>
        <div id="cart-items">
            <p style="color:#999;text-align:center;margin-top:20px;">Your cart is empty</p>
        </div>
        <div id="cart-footer">
            <div id="cart-total">Total: $0.00</div>
            <button id="checkout-btn" onclick="checkout()">Checkout</button>
        </div>
    </div>

    <main>
        <h2>Shop</h2>
        <div id="products-grid">
            <p>Loading products...</p>
        </div>
    </main>

    <footer>
        <p>Southern Market 202 &copy; 2025 &nbsp;|&nbsp; Williamston, South Carolina</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://cljkimiocyodlyrlxkjl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsamtpbWlvY3lvZGx5cmx4a2psIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODI4NTUsImV4cCI6MjA5NDk1ODg1NX0.oQ6v5iKSzUGY9cNwv1lUfAFJeqiJAwRQnu6R0bsx2Uw';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cart = [];

        function openCart() {
            document.getElementById('cart-drawer').classList.add('open');
            document.getElementById('overlay').classList.add('open');
        }

        function closeCart() {
            document.getElementById('cart-drawer').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        }

        function addToCart(id, name, price) {
            const existing = cart.find(i => i.id === id);
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ id, name, price, qty: 1 });
            }
            updateCart();
            openCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCart();
        }

        function updateCart() {
            const count = cart.reduce((sum, i) => sum + i.qty, 0);
            const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
            document.getElementById('cart-count').textContent = count;
            document.getElementById('cart-total').textContent = `Total: $${total.toFixed(2)}`;
            const cartItems = document.getElementById('cart-items');
            if (!cart.length) {
                cartItems.innerHTML = '<p style="color:#999;text-align:center;margin-top:20px;">Your cart is empty</p>';
                return;
            }
            cartItems.innerHTML = cart.map(i => `
                <div class="cart-item">
                    <div>
                        <div class="cart-item-name">${i.name} x${i.qty}</div>
                        <div class="cart-item-price">$${(i.price * i.qty).toFixed(2)}</div>
                    </div>
                    <button class="remove-item" onclick="removeFromCart(${i.id})">×</button>
                </div>
            `).join('');
        }

        function checkout() {
            if (!cart.length) { alert('Your cart is empty!'); return; }
            alert('Checkout coming soon! Please contact us to complete your purchase.');
        }

        async function loadProducts() {
            const { data, error } = await client.from('products').select('*').eq('available', true);
            const grid = document.getElementById('products-grid');
            if (error) { grid.innerHTML = '<p>Error loading products.</p>'; return; }
            if (!data.length) { grid.innerHTML = '<p>No products yet.</p>'; return; }
            grid.innerHTML = data.map(p => `
                <div class="product-card">
                    ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}">` : ''}
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p>${p.description}</p>
                        <p class="product-price">$${p.price}</p>
                        <button class="add-to-cart" onclick="addToCart(${p.id}, '${p.name}', ${p.price})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        loadProducts();
    </script>

</body>
</html>
