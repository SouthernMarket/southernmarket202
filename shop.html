<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — Southern Market 202</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy:   #1a2744;
            --black:  #0a0a0a;
            --blue:   #a8c0d6;
            --white:  #ffffff;
            --heading:#1a1a1a;
            --body:   #5a5a5a;
            --border: #e8e8e8;
            --dim:    rgba(255,255,255,0.55);
            --dborder:rgba(255,255,255,0.12);
        }

        body {
            font-family: 'Helvetica Neue', Arial, Helvetica, sans-serif;
            background: var(--white);
            color: var(--heading);
        }

        /* ── HEADER ── */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 48px;
            height: 72px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 200;
        }

        .logo { text-decoration: none; display: inline-block; line-height: 1; }

        .logo-block {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            background: var(--navy);
            padding: 8px 14px 10px;
            gap: 3px;
        }

        .logo-top {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--white);
            display: block;
            white-space: nowrap;
        }

        .logo-bottom {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--white);
            display: block;
            white-space: nowrap;
        }

        nav {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
        }

        nav a {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--navy);
            text-decoration: none;
            transition: color 0.2s;
        }

        nav a:hover, nav a.active { color: var(--blue); }

        .header-right {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
        }

        .header-social { display: flex; gap: 14px; align-items: center; }
        .header-social a { display: flex; color: var(--blue); transition: opacity 0.2s; }
        .header-social a:hover { opacity: 0.65; }
        .header-social svg { width: 18px; height: 18px; fill: currentColor; }

        #cart-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--navy);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            font-family: 'Helvetica Neue', Arial, Helvetica, sans-serif;
        }

        #cart-btn:hover { background: var(--navy); color: var(--white); border-color: var(--navy); }

        /* ── HAMBURGER ── */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 4px;
            background: none;
            border: none;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--navy);
            transition: all 0.3s;
        }

        .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* ── MOBILE MENU ── */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 72px;
            left: 0;
            right: 0;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            z-index: 199;
            padding: 24px 32px;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }

        .mobile-menu.open { display: flex; }

        .mobile-menu a {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--navy);
            text-decoration: none;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            transition: color 0.2s;
        }

        .mobile-menu a:last-child { border-bottom: none; }
        .mobile-menu a:hover, .mobile-menu a.active { color: var(--blue); }

        .mobile-social { display: flex; gap: 16px; padding-top: 20px; }
        .mobile-social a { display: flex; color: var(--blue); }
        .mobile-social svg { width: 20px; height: 20px; fill: currentColor; }

        /* ── PAGE HERO ── */
        .page-hero {
            background: var(--navy);
            padding: 80px 48px;
            text-align: center;
        }

        .page-hero p {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 12px;
        }

        .page-hero h1 {
            font-size: 56px;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -1.5px;
            line-height: 1;
        }

        .page-hero h1 em {
            font-style: normal;
            color: rgba(255,255,255,0.65);
        }

        /* ── SHOP SECTION ── */
        .shop-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 48px;
        }

        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 48px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .shop-header-left p {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 8px;
        }

        .shop-header-left h2 {
            font-size: 32px;
            font-weight: 800;
            color: var(--heading);
            letter-spacing: -0.5px;
        }

        #products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 32px;
        }

        /* ── PRODUCT CARDS ── */
        .product-card {
            background: var(--white);
            border: 1px solid var(--border);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(26,39,68,0.1);
        }

        .price-tag-hole { display: none; }

        .product-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
        }

        .product-img-placeholder {
            width: 100%;
            height: 260px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .product-info {
            padding: 24px;
            border-top: 1px solid var(--border);
        }

        .product-category {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--heading);
            margin-bottom: 8px;
            line-height: 1.2;
            letter-spacing: -0.3px;
        }

        .product-desc {
            font-size: 13px;
            font-weight: 400;
            color: var(--body);
            line-height: 1.65;
            margin-bottom: 20px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 24px;
            font-weight: 800;
            color: var(--heading);
            letter-spacing: -0.5px;
        }

        .add-to-cart {
            background: var(--navy);
            color: var(--white);
            border: none;
            padding: 10px 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Helvetica Neue', Arial, Helvetica, sans-serif;
        }

        .add-to-cart:hover { background: var(--black); }

        /* ── CART DRAWER ── */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 300;
        }

        #overlay.open { display: block; }

        #cart-drawer {
            position: fixed;
            top: 0;
            right: -420px;
            width: 420px;
            height: 100%;
            background: var(--white);
            z-index: 400;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
        }

        #cart-drawer.open { right: 0; }

        .cart-head {
            padding: 28px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-head h3 {
            font-size: 18px;
            font-weight: 800;
            color: var(--heading);
            letter-spacing: -0.3px;
        }

        #close-cart {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--body);
            cursor: pointer;
            line-height: 1;
        }

        #cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-info { flex: 1; }
        .cart-item-name { font-size: 14px; font-weight: 600; color: var(--heading); margin-bottom: 4px; }
        .cart-item-price { font-size: 16px; font-weight: 700; color: var(--navy); }

        .remove-item {
            background: none;
            border: none;
            color: #c0c0c0;
            cursor: pointer;
            font-size: 20px;
            padding: 4px;
            transition: color 0.2s;
            line-height: 1;
        }

        .remove-item:hover { color: var(--heading); }

        .cart-foot {
            padding: 24px 32px;
            border-top: 1px solid var(--border);
        }

        #cart-total {
            font-size: 22px;
            font-weight: 800;
            color: var(--heading);
            margin-bottom: 20px;
            text-align: right;
            letter-spacing: -0.3px;
        }

        #checkout-btn {
            width: 100%;
            background: var(--navy);
            color: var(--white);
            border: none;
            padding: 16px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Helvetica Neue', Arial, Helvetica, sans-serif;
        }

        #checkout-btn:hover { background: var(--black); }
        #checkout-btn:disabled { background: #c0c0c0; cursor: not-allowed; }

        .success-banner {
            background: var(--navy);
            color: var(--white);
            text-align: center;
            padding: 16px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* ── FOOTER ── */
        footer {
            background: var(--black);
            border-top: 1px solid var(--dborder);
            padding: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-logo { text-decoration: none; display: inline-block; }

        .footer-logo-block {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 3px;
        }

        .footer-logo-top {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--white);
            text-transform: uppercase;
            display: block;
            white-space: nowrap;
        }

        .footer-logo-bottom {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--white);
            text-transform: uppercase;
            display: block;
            white-space: nowrap;
        }

        .footer-copy { font-size: 12px; font-weight: 400; color: var(--dim); letter-spacing: 0.3px; }
        .footer-social { display: flex; gap: 16px; }
        .footer-social a { color: var(--dim); transition: color 0.2s; }
        .footer-social a:hover { color: var(--white); }
        .footer-social svg { width: 18px; height: 18px; fill: currentColor; }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            header { padding: 0 20px; grid-template-columns: 1fr auto; }
            nav { display: none; }
            .header-social { display: none; }
            .hamburger { display: flex; }
            .page-hero { padding: 60px 24px; }
            .page-hero h1 { font-size: 40px; }
            .shop-section { padding: 40px 20px; }
            #products-grid { grid-template-columns: 1fr; }
            #cart-drawer { width: 100%; right: -100%; }
            footer { flex-direction: column; gap: 24px; text-align: center; padding: 40px 24px; }
            .footer-logo-block { align-items: center; }
        }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://cljkimiocyodlyrlxkjl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsamtpbWlvY3lvZGx5cmx4a2psIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODI4NTUsImV4cCI6MjA5NDk1ODg1NX0.oQ6v5iKSzUGY9cNwv1lUfAFJeqiJAwRQnu6R0bsx2Uw';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('success')) {
        const banner = document.createElement('div');
        banner.className = 'success-banner';
        banner.textContent = '✓ Thank you for your order! We will be in touch soon.';
        document.body.insertBefore(banner, document.querySelector('.page-hero'));
    }

    let cart = [];

    function toggleMenu() {
        const menu = document.getElementById('mobile-menu');
        const hamburger = document.getElementById('hamburger');
        menu.classList.toggle('open');
        hamburger.classList.toggle('open');
    }

    function openCart() {
        document.getElementById('cart-drawer').classList.add('open');
        document.getElementById('overlay').classList.add('open');
    }

    function closeCart() {
        document.getElementById('cart-drawer').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
    }

    function addToCart(id, name, price) {
        const existing = cart.find(i => i.id === id);
        if (existing) { existing.qty += 1; }
        else { cart.push({ id, name, price, qty: 1 }); }
        updateCart();
        openCart();
    }

    function removeFromCart(id) {
        cart = cart.filter(i => i.id !== id);
        updateCart();
    }

    function updateCart() {
        const count = cart.reduce((sum, i) => sum + i.qty, 0);
        const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
        document.getElementById('cart-count').textContent = count;
        document.getElementById('cart-total').textContent = `Total: $${total.toFixed(2)}`;
        const cartItems = document.getElementById('cart-items');
        if (!cart.length) {
            cartItems.innerHTML = '<p style="color:#c0c0c0;text-align:center;margin-top:40px;font-size:13px;letter-spacing:1px;">Your cart is empty</p>';
            return;
        }
        cartItems.innerHTML = cart.map(i => `
            <div class="cart-item">
                <div class="cart-item-info">
                    <div class="cart-item-name">${i.name} × ${i.qty}</div>
                    <div class="cart-item-price">$${(i.price * i.qty).toFixed(2)}</div>
                </div>
                <button class="remove-item" onclick="removeFromCart(${i.id})">×</button>
            </div>
        `).join('');
    }

    async function checkout() {
        if (!cart.length) { alert('Your cart is empty!'); return; }
        const btn = document.getElementById('checkout-btn');
        btn.textContent = 'Processing...';
        btn.disabled = true;
        try {
            const response = await fetch(`${SUPABASE_URL}/functions/v1/create-checkout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
                body: JSON.stringify({ items: cart }),
            });
            const data = await response.json();
            if (data.url) { window.location.href = data.url; }
            else { throw new Error(data.error || 'Checkout failed'); }
        } catch (error) {
            alert('Checkout error: ' + error.message);
            btn.textContent = 'Proceed to Checkout';
            btn.disabled = false;
        }
    }

    async function loadProducts() {
        const { data, error } = await client.from('products').select('*').eq('available', true);
        const grid = document.getElementById('products-grid');
        if (error) { grid.innerHTML = '<p>Error loading products.</p>'; return; }
        if (!data.length) { grid.innerHTML = '<p style="color:#5a5a5a;font-size:14px;letter-spacing:1px;">No products yet — check back soon.</p>'; return; }
        grid.innerHTML = data.map(p => `
            <div class="product-card">
                <div class="price-tag-hole"></div>
                ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}" class="product-img">` : `<div class="product-img-placeholder">🏺</div>`}
                <div class="product-info">
                    <p class="product-category">${p.category || 'Vintage'}</p>
                    <h3 class="product-name">${p.name}</h3>
                    <p class="product-desc">${p.description}</p>
                    <div class="product-footer">
                        <span class="product-price">$${p.price}</span>
                        <button class="add-to-cart" onclick="addToCart(${p.id}, '${p.name}', ${p.price})">Add to Cart</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function calibrateLogos() {
        [
            ['.logo-top',        '.logo-bottom'],
            ['.footer-logo-top', '.footer-logo-bottom']
        ].forEach(([topSel, botSel]) => {
            document.querySelectorAll(topSel).forEach(top => {
                const bottom = top.parentElement.querySelector(botSel);
                if (!bottom) return;
                top.style.letterSpacing = '0px';
                const gap = (bottom.getBoundingClientRect().width - top.getBoundingClientRect().width) / top.textContent.trim().length;
                top.style.letterSpacing = Math.max(0, gap) + 'px';
            });
        });
    }

    document.addEventListener('DOMContentLoaded', calibrateLogos);
    window.addEventListener('resize', calibrateLogos);

    loadProducts();
</script>
